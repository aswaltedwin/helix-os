services:
  postgres:
    image: postgres:16-alpine
    container_name: helix_postgres
    environment:
      POSTGRES_USER: helixos
      POSTGRES_PASSWORD: helixos_dev_password
      POSTGRES_DB: helixos


    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U helixos" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: helix_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:0.5.0
    container_name: helix_chroma
    ports:
      - "8001:8000"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: backend/.env
    container_name: helix_backend
    ports:



      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_started
    volumes:
      - ./backend:/app
    command: "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: helix_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: "npm run dev"

volumes:
  postgres_data:


networks:
  default:
    name: helix_network
